<!DOCTYPE html>

<html lang="it">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">

<title>WorkLog Pro v4</title>



<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>



<style>

:root { --ios-blue:#007AFF; --ios-bg:#F2F2F7; }

body { background:var(--ios-bg); font-family:-apple-system,system-ui,sans-serif; padding-bottom:170px;}

.ios-card{background:white;border-radius:14px;margin-bottom:12px;}

.btn-check{border:1px solid #e2e8f0;font-size:10px;padding:6px 2px;border-radius:8px;text-align:center;font-weight:600;color:#64748b;}

.btn-check.active{background:#007AFF;color:white;border-color:#007AFF;}

.sticky-header{position:sticky;top:0;z-index:50;background:rgba(242,242,247,.85);backdrop-filter:blur(20px);border-bottom:.5px solid #d1d1d6;}



@keyframes scaleIn {

  from { transform:scale(0.9); opacity:0; }

  to { transform:scale(1); opacity:1; }

}

.animate-scale { animation:scaleIn 0.18s ease-out; }

</style>

</head>



<body>



<header class="sticky-header px-4 pt-10 pb-4">

<div class="flex justify-between items-end">

<div>

<h1 id="titoloMese" class="text-3xl font-bold">Mese</h1>

<p id="subtotale" class="text-blue-500 font-semibold text-sm">0.00€ rimborso mese</p>

</div>

<div class="flex gap-2">

<select id="selectMese" class="bg-white rounded px-2 py-1 text-sm"></select>

<select id="selectAnno" class="bg-white rounded px-2 py-1 text-sm"></select>

</div>

</div>

</header>



<div class="grid grid-cols-2 gap-3 p-4">

<div class="ios-card p-4 shadow-sm">

<span class="text-xs text-gray-400 font-bold block mb-1">Ore Mese</span>

<span id="statOre" class="text-xl font-bold text-slate-800">0h (+0)</span>

</div>

<div class="ios-card p-4 shadow-sm">

<span class="text-xs text-gray-400 font-bold block mb-1">€ Mese</span>

<span id="statSoldi" class="text-xl font-bold text-emerald-600">0.00€</span>

</div>

</div>



<div class="px-4">

<div class="ios-card p-4 shadow-sm">

<span class="text-xs text-gray-400 font-bold block mb-2">Totali Mese</span>

<div class="grid grid-cols-2 gap-2 text-sm font-semibold">

<div>€: <span id="meseEuro">0.00</span></div>

<div>Ore: <span id="meseOre">0</span></div>

<div>Straord: <span id="meseExtra">0</span></div>

<div>KM: <span id="meseKm">0</span></div>

</div>

</div>

</div>



<div id="listaGiorni" class="px-4"></div>



<div class="px-4 mt-4 mb-8 text-center">

<button onclick="resetMese()" class="text-red-500 text-xs font-bold py-4">

⚠️ Svuota tutto il mese

</button>

</div>



<div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 pb-8 text-center">

<span class="font-bold">Totali Anno</span>

<div class="text-xs font-semibold mt-1">

€ <span id="annoEuro">0.00</span> |

Ore <span id="annoOre">0</span> |

Straord <span id="annoExtra">0</span> |

KM <span id="annoKm">0</span>

</div>



<button onclick="esportaExcel()" class="mt-3 bg-blue-600 text-white px-6 py-2 rounded-xl font-bold text-sm">

Esporta Excel

</button>

</div>



<!-- MODALE INFO CLIENTE -->

<div id="modalOverlay" class="hidden fixed inset-0 bg-black bg-opacity-40 backdrop-blur-sm flex items-center justify-center z-50">

  <div class="bg-white w-80 max-w-[90%] rounded-2xl shadow-xl p-5 relative animate-scale">

    <button onclick="chiudiModal()" class="absolute top-3 right-3 text-gray-400 text-lg font-bold">✕</button>

    <h2 class="text-lg font-bold mb-4">Dettagli Cliente</h2>

    <div id="modalContent"></div>

  </div>

</div>



<script>

const mesi=["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];

const tariffe={entro200:5.16,oltre200:10.33,prima7:4.65,dopo20:4.65,notte:15.49};



let datiLavoro=JSON.parse(localStorage.getItem('worklog_v4'))||{};

const selMese=document.getElementById('selectMese');

const selAnno=document.getElementById('selectAnno');



function init(){

const oggi=new Date();

mesi.forEach((m,i)=>selMese.innerHTML+=`<option value="${i}" ${i===oggi.getMonth()?'selected':''}>${m}</option>`);

for(let a=2024;a<=2028;a++) selAnno.innerHTML+=`<option value="${a}" ${a===oggi.getFullYear()?'selected':''}>${a}</option>`;

selMese.onchange=render;

selAnno.onchange=render;

render();

}



function render(){

const m=parseInt(selMese.value),a=parseInt(selAnno.value);

const numGiorni=new Date(a,m+1,0).getDate();

const container=document.getElementById('listaGiorni');

document.getElementById('titoloMese').innerText=mesi[m];

container.innerHTML='';



for(let g=1;g<=numGiorni;g++){

const id=`${a}-${m}-${g}`;

if(!datiLavoro[id]){

datiLavoro[id]={ore:8,cliente:'',km:0,ind:[],altreSpese:0,info:{luogo:'',referente:'',telefono:'',note:''}};

}

const r=datiLavoro[id];



const card=document.createElement('div');

card.className="ios-card p-4 shadow-sm";

card.innerHTML=`

<div class="flex justify-between mb-3">

<div>

<b>${g}</b>

<input type="text" value="${r.cliente}"

       onchange="salva('${id}','cliente',this.value)"

       placeholder="Cliente"

       class="ml-2 border p-1 text-sm rounded w-32">

<button onclick="apriModal('${id}')"

        class="ml-1 text-xs bg-gray-200 px-2 py-1 rounded">ℹ</button>

</div>

<div>

<input type="number" step="0.5" value="${r.ore}"

       onchange="salva('${id}','ore',this.value)"

       class="w-14 border text-center text-sm">

</div>

</div>



<div class="flex gap-2 text-xs mb-2">

${Object.keys(tariffe).map(k=>

`<div onclick="toggleInd('${id}','${k}')"

 class="btn-check ${r.ind.includes(k)?'active':''}">${k}</div>`

).join('')}

</div>



<div class="flex gap-2 text-sm">

KM <input type="number" value="${r.km}" onchange="salva('${id}','km',this.value)" class="w-16 border text-center">

Extra € <input type="number" value="${r.altreSpese}" onchange="salva('${id}','altreSpese',this.value)" class="w-16 border text-center">

<span class="ml-auto font-bold">${calcolaGiorno(r).toFixed(2)}€</span>

</div>`;

container.appendChild(card);

}

updateStats();

}



function apriModal(id){

const r=datiLavoro[id];

document.getElementById("modalContent").innerHTML=`

<div class="mb-3">

<label class="text-xs text-gray-500">Luogo</label>

<input type="text" value="${r.info.luogo||''}"

onchange="salvaInfo('${id}','luogo',this.value)"

class="border p-2 w-full rounded-lg mt-1 text-sm">

</div>



<div class="mb-3">

<label class="text-xs text-gray-500">Referente</label>

<input type="text" value="${r.info.referente||''}"

onchange="salvaInfo('${id}','referente',this.value)"

class="border p-2 w-full rounded-lg mt-1 text-sm">

</div>



<div class="mb-3">

<label class="text-xs text-gray-500">Telefono</label>

<input type="text" value="${r.info.telefono||''}"

onchange="salvaInfo('${id}','telefono',this.value)"

class="border p-2 w-full rounded-lg mt-1 text-sm">

</div>



<div>

<label class="text-xs text-gray-500">Note</label>

<textarea onchange="salvaInfo('${id}','note',this.value)"

class="border p-2 w-full rounded-lg mt-1 text-sm"

rows="3">${r.info.note||''}</textarea>

</div>`;

document.getElementById("modalOverlay").classList.remove("hidden");

}



function chiudiModal(){

document.getElementById("modalOverlay").classList.add("hidden");

}



document.getElementById("modalOverlay").addEventListener("click",function(e){

if(e.target===this) chiudiModal();

});



function salvaInfo(id,campo,val){

datiLavoro[id].info[campo]=val;

salvaDati();

}



function calcolaGiorno(r){

let tot=parseFloat(r.altreSpese||0);

if(r.ind) r.ind.forEach(k=>tot+=tariffe[k]);

return tot;

}



function toggleInd(id,tipo){

const i=datiLavoro[id].ind.indexOf(tipo);

i>-1?datiLavoro[id].ind.splice(i,1):datiLavoro[id].ind.push(tipo);

salvaDati();render();

}



function salva(id,campo,val){

datiLavoro[id][campo]=campo==='cliente'?val:parseFloat(val)||0;

salvaDati();updateStats();

}



function salvaDati(){

localStorage.setItem('worklog_v4',JSON.stringify(datiLavoro));

}



function resetMese(){

if(confirm("Sicuro di cancellare il mese?")){

const m=selMese.value,a=selAnno.value;

Object.keys(datiLavoro).forEach(k=>{if(k.startsWith(`${a}-${m}-`)) delete datiLavoro[k];});

salvaDati();render();

}

}



function updateStats(){

let meseOre=0,meseExtra=0,meseEuro=0,meseKm=0;

let annoOre=0,annoExtra=0,annoEuro=0,annoKm=0;

const curM=selMese.value,curA=selAnno.value;



Object.entries(datiLavoro).forEach(([id,r])=>{

const [a,m]=id.split('-');

const ore=r.ore||0;

const extra=ore>8?ore-8:0;

const euro=calcolaGiorno(r);

const km=r.km||0;



if(a==curA){

annoOre+=ore;annoExtra+=extra;annoEuro+=euro;annoKm+=km;

if(parseInt(m)==parseInt(curM)){

meseOre+=ore;meseExtra+=extra;meseEuro+=euro;meseKm+=km;

}

}

});



document.getElementById('statOre').innerText=`${meseOre}h (+${meseExtra})`;

document.getElementById('statSoldi').innerText=`${meseEuro.toFixed(2)}€`;

document.getElementById('subtotale').innerText=`${meseEuro.toFixed(2)}€ rimborso mese`;



document.getElementById('meseEuro').innerText=meseEuro.toFixed(2);

document.getElementById('meseOre').innerText=meseOre;

document.getElementById('meseExtra').innerText=meseExtra;

document.getElementById('meseKm').innerText=meseKm;



document.getElementById('annoEuro').innerText=annoEuro.toFixed(2);

document.getElementById('annoOre').innerText=annoOre;

document.getElementById('annoExtra').innerText=annoExtra;

document.getElementById('annoKm').innerText=annoKm;

}



function esportaExcel(){

const a=selAnno.value;

const wb=XLSX.utils.book_new();

const rows=[["DATA","CLIENTE","ORE","ORD","EXTRA","KM","INDENNITA","ALTRE SPESE","TOT"]];

const m=selMese.value;

const numGiorni=new Date(a,parseInt(m)+1,0).getDate();



for(let g=1;g<=numGiorni;g++){

const id=`${a}-${m}-${g}`;

const r=datiLavoro[id];

const extra=r.ore>8?r.ore-8:0;

rows.push([

`${g}/${parseInt(m)+1}/${a}`,

r.cliente,r.ore,r.ore>8?8:r.ore,extra,r.km,

calcolaGiorno({...r,altreSpese:0}),

r.altreSpese||0,

calcolaGiorno(r)

]);

}

XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),"Report Mensile");

XLSX.writeFile(wb,`Report_Lavoro_${a}.xlsx`);

}



init();

</script>

</body>

</html>
